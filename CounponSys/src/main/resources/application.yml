server:
  port: 8090

spring:
  application:
    name: coupon-system

  # 数据源配置 - Oracle + Druid连接池监控
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: oracle.jdbc.OracleDriver
    url: jdbc:oracle:thin:@${DB_HOST:localhost}:${DB_PORT:1521}:${DB_SID:ORCL}
    username: ${DB_USERNAME:coupon_user}
    password: ${DB_PASSWORD:coupon_pass}
    druid:
      # 连接池大小
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 30000
      # 检测空闲/泄漏连接（关键！防止长连接卡死）
      time-between-eviction-runs-millis: 60000    # 每分钟检测一次
      min-evictable-idle-time-millis: 300000       # 空闲5分钟才回收
      max-evictable-idle-time-millis: 900000       # 最长空闲15分钟强制回收
      validation-query: SELECT 1 FROM DUAL         # Oracle心跳SQL
      test-while-idle: true                        # 空闲时检测连接有效性
      test-on-borrow: false                        # 借出时不检测（性能考虑）
      test-on-return: false
      # 连接泄漏检测（排查哪个SQL长连接卡住）
      remove-abandoned: true
      remove-abandoned-timeout: 180                # 3分钟未归还判定为泄漏
      log-abandoned: true                          # 打印泄漏连接的调用栈（定位问题！）
      # 慢SQL监控
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=2000
      # 过滤器：stat=SQL统计, wall=SQL防注入, slf4j=日志
      filters: stat,wall,slf4j
      # Druid Web监控控制台
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: ${DRUID_USER:admin}
        login-password: ${DRUID_PASS:admin123}
        allow: 127.0.0.1                           # 生产环境限制只允许内网访问
        reset-enable: false
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.css,/druid/*"

  # Redis配置
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 3000ms

  # ActiveMQ配置 (低并发场景备用)
  activemq:
    broker-url: tcp://${MQ_HOST:localhost}:${MQ_PORT:61616}
    user: ${MQ_USER:admin}
    password: ${MQ_PASSWORD:admin}
    pool:
      enabled: true
      max-connections: 10
  jms:
    pub-sub-domain: false

  # Kafka配置 (高并发场景推荐 - 5-10W QPS)
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      # 生产者配置
      retries: 3
      batch-size: 16384
      buffer-memory: 33554432
      acks: 1
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      # 2026-03-26 优化
      # 消费者配置
      group-id: coupon-system
      auto-offset-reset: earliest
      enable-auto-commit: false
      # 原来值: 500 (保持不变，已优化)
      max-poll-records: 500  # 批量拉取，减少网络开销
      # 新增: 优化拉取策略
      fetch-min-size: 1024   # 最小拉取1KB
      fetch-max-wait: 500    # 最多等待500ms
      # end 2026-03-26 优化
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    listener:
      # 2026-03-26 优化
      # 监听器配置
      # 原来值: 10
      concurrency: 20  # 增加消费者线程，提升50%消费速度
      # end 2026-03-26 优化
      ack-mode: manual

  # 异步任务配置
  task:
    execution:
      pool:
        core-size: 10
        max-size: 50
        queue-capacity: 200
        keep-alive: 60s
        thread-name-prefix: coupon-async-
    scheduling:
      pool:
        size: 5
        thread-name-prefix: coupon-scheduled-

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: sys.smc.coupon.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    cache-enabled: false
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-value: 1
      logic-not-delete-value: 0
    banner: false

# 日志配置
logging:
  level:
    sys.smc.coupon: DEBUG
    org.springframework: INFO

# Spring MVC配置(Swagger兼容)
spring.mvc.pathmatch.matching-strategy: ant_path_matcher

# Knife4j配置
knife4j:
  enable: true
  setting:
    language: zh-CN

# 优惠券系统配置
coupon:
  # 券码生成配置
  code:
    prefix: CP
    length: 16
    # 兑换码防刷配置
    redeem:
      hmac-secret: ${COUPON_HMAC_SECRET:CouponSys@SmartOne2026!}  # 生产必须改！
      ip-rate-limit: 10          # 同IP每分钟最多尝试兑换次数
      user-rate-limit: 5         # 同用户每分钟最多尝试兑换次数
      global-rate-limit: 5000    # 全局每秒最大兑换请求数
  # 库存预警阈值
  stock:
    warning-threshold: 0.1
  # 风控配置
  risk:
    # 单用户每日最大领取次数
    max-claim-per-day: 10
    # 秒杀单用户限制
    seckill-limit-per-activity: 1

# 秒杀配置
seckill:
  # 库存预热提前时间(分钟)
  warmup-minutes: 10
  # 2026-03-26 优化
  # 限流配置
  rate-limit:
    # 固定限流（已弃用，改用动态限流）
    # capacity: 1000
    # refill-rate: 100
    # 动态限流配置
    dynamic-enabled: true    # 启用动态限流
    rate-multiplier: 1.5     # 限流倍数（剩余库存的1.5倍）
    min-rate: 100            # 最小限流（库存为0时）
    max-rate: 10000          # 最大限流（防止过载）
  # end 2026-03-26 优化

# 外部系统对接配置
integration:
  # 计费系统
  billing:
    base-url: ${BILLING_URL:http://billing-service:8080}
    timeout: 5000
  # 积分系统
  points:
    base-url: ${POINTS_URL:http://points-service:8080}
    timeout: 3000

