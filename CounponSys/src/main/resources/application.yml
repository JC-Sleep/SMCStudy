server:
  port: 8090

spring:
  application:
    name: coupon-system

  # 数据源配置 - Oracle
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    url: jdbc:oracle:thin:@${DB_HOST:localhost}:${DB_PORT:1521}:${DB_SID:ORCL}
    username: ${DB_USERNAME:coupon_user}
    password: ${DB_PASSWORD:coupon_pass}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: CouponHikariPool

  # Redis配置
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 3000ms

  # ActiveMQ配置 (低并发场景备用)
  activemq:
    broker-url: tcp://${MQ_HOST:localhost}:${MQ_PORT:61616}
    user: ${MQ_USER:admin}
    password: ${MQ_PASSWORD:admin}
    pool:
      enabled: true
      max-connections: 10
  jms:
    pub-sub-domain: false

  # Kafka配置 (高并发场景推荐 - 5-10W QPS)
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      # 生产者配置
      retries: 3
      batch-size: 16384
      buffer-memory: 33554432
      acks: 1
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      # 消费者配置
      group-id: coupon-system
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 500
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    listener:
      # 监听器配置
      concurrency: 10
      ack-mode: manual

  # 异步任务配置
  task:
    execution:
      pool:
        core-size: 10
        max-size: 50
        queue-capacity: 200
        keep-alive: 60s
        thread-name-prefix: coupon-async-
    scheduling:
      pool:
        size: 5
        thread-name-prefix: coupon-scheduled-

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: sys.smc.coupon.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    cache-enabled: false
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-value: 1
      logic-not-delete-value: 0
    banner: false

# 日志配置
logging:
  level:
    sys.smc.coupon: DEBUG
    org.springframework: INFO

# Spring MVC配置(Swagger兼容)
spring.mvc.pathmatch.matching-strategy: ant_path_matcher

# Knife4j配置
knife4j:
  enable: true
  setting:
    language: zh-CN

# 优惠券系统配置
coupon:
  # 券码生成配置
  code:
    prefix: CP
    length: 16
  # 库存预警阈值
  stock:
    warning-threshold: 0.1
  # 风控配置
  risk:
    # 单用户每日最大领取次数
    max-claim-per-day: 10
    # 秒杀单用户限制
    seckill-limit-per-activity: 1

# 秒杀配置
seckill:
  # 库存预热提前时间(分钟)
  warmup-minutes: 10
  # 限流-令牌桶容量
  rate-limit:
    capacity: 1000
    refill-rate: 100

# 外部系统对接配置
integration:
  # 计费系统
  billing:
    base-url: ${BILLING_URL:http://billing-service:8080}
    timeout: 5000
  # 积分系统
  points:
    base-url: ${POINTS_URL:http://points-service:8080}
    timeout: 3000

