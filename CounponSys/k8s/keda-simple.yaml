# KEDA简化配置（快速开始）
# 只保留核心配置，适合快速测试
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: coupon-kafka-simple
  namespace: default
spec:
  scaleTargetRef:
    name: coupon-system
  minReplicaCount: 1
  maxReplicaCount: 20
  pollingInterval: 15
  cooldownPeriod: 300
  triggers:
  - type: kafka
    metadata:
      bootstrapServers: kafka-service:9092
      consumerGroup: seckill-order-consumer
      topic: seckill-order
      lagThreshold: '1000'
